name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          CHANNEL_TAG=$(grep '^channel_tag=' gradle.properties | cut -d'=' -f2)
          FULL_VERSION="${VERSION}${CHANNEL_TAG}"

          echo "Validating tag '$TAG' against version '$FULL_VERSION'..."
          if [[ "$TAG" != "$FULL_VERSION" ]]; then
            echo "::error::Tag '$TAG' does not match version '$FULL_VERSION' in gradle.properties."

            if gh release view "$TAG" &>/dev/null; then
              echo "Deleting GitHub release for $TAG..."
              gh release delete "$TAG" -y
            fi

            git push origin ":refs/tags/$TAG"
            exit 1
          fi
          echo "✓ Tag matches version."

  build:
    needs: validate
    uses: ./.github/workflows/build_reusable.yml
    with:
      release: true

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    outputs:
      publish_github: ${{ steps.check.outputs.publish_github }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare git-cliff
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          sed -i "s|%%%repo_url%%%|${REPO_URL}|g" cliff.toml

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --output CHANGELOG.md
          version: 'v2.10.1'

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  github-release:
    name: Release to GitHub
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating or updating release for $TAG"
          # Try to create the release first
          if ! gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            --latest \
            --verify-tag \
            ./target/*.jar; then

            echo "Release already exists. Updating existing release..."

            # Update release notes and mark as latest
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file CHANGELOG.md \
              --latest

            # Re-upload artifacts (delete first to avoid duplicates)
            for FILE in ./build/libs/*.jar; do
              NAME=$(basename "$FILE")
              gh release delete-asset "$TAG" "$NAME" -y || true
              gh release upload "$TAG" "$FILE" --clobber
            done
          fi
      - name: Publish to Maven Central
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: |
            publishAllPublicationsToMavenCentralRepository
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}